---
- name: Ensure K3s config directory exists
  ansible.builtin.file:
    path: "{{ k3s_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Check current K3s version
  ansible.builtin.command:
    cmd: "{{ k3s_binary_path }} --version"
  register: k3s_version_result
  changed_when: false
  failed_when: false

- name: Determine whether K3s install is needed
  ansible.builtin.set_fact:
    k3s_needs_install: "{{ k3s_detected_version != k3s_version }}"
  vars:
    k3s_detected_version: "{{ (k3s_version_result.stdout | default('')) | regex_search(k3s_version_regex) | default('', true) }}"
    k3s_version_regex: "v[0-9]+\\.[0-9]+\\.[0-9]+\\+k3s[0-9]+"

- name: Render K3s server config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ k3s_config_file }}"
    owner: root
    group: root
    mode: "0600"
  notify: Restart K3s service

- name: Download K3s installer
  ansible.builtin.get_url:
    url: "{{ k3s_install_script_url }}"
    dest: "{{ k3s_install_script_path }}"
    owner: root
    group: root
    mode: "0700"
  when: k3s_needs_install | bool

- name: Install requested K3s version
  ansible.builtin.command:
    cmd: "{{ k3s_install_script_path }}"
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: "{{ k3s_install_exec }}"
  when: k3s_needs_install | bool

- name: Remove K3s installer
  ansible.builtin.file:
    path: "{{ k3s_install_script_path }}"
    state: absent
  when: k3s_needs_install | bool

- name: Ensure K3s service is running
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started

- name: Apply pending K3s restart
  ansible.builtin.meta: flush_handlers

- name: Verify K3s node is healthy
  ansible.builtin.command:
    cmd: "{{ k3s_status_command }}"
  register: k3s_node_health
  retries: 12
  delay: 10
  until: k3s_node_health.rc == 0
  changed_when: false
