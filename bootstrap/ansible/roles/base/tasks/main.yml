---
- name: Install base packages
  ansible.builtin.apt:
    name: "{{ base_packages }}"
    state: present
    update_cache: true # Refresh package metadata before installing.
    cache_valid_time: 3600 # Reuse apt metadata for one hour to keep reruns quick.

- name: Check whether UFW is active
  ansible.builtin.command:
    cmd: ufw status
  register: base_ufw_status
  changed_when: false
  failed_when: false

- name: Disable active UFW for Kubernetes networking
  ansible.builtin.command:
    cmd: ufw disable
  when:
    - base_disable_ufw
    - base_ufw_status.rc == 0
    - "'Status: active' in base_ufw_status.stdout"

- name: Persist Kubernetes kernel modules across reboots
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k3s.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      {% for module in base_kernel_modules %}
      {{ module }}
      {% endfor %}

- name: Load Kubernetes kernel modules for current boot
  ansible.builtin.command:
    cmd: "modprobe {{ item }}"
  loop: "{{ base_kernel_modules }}"
  changed_when: false

- name: Persist Kubernetes sysctl settings across reboots
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-k3s.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      {% for key, value in base_sysctl_settings.items() %}
      {{ key }} = {{ value }}
      {% endfor %}

- name: Read current Kubernetes sysctl settings
  ansible.builtin.command:
    cmd: "sysctl -n {{ item.key }}"
  loop: "{{ base_sysctl_settings | dict2items }}"
  changed_when: false
  register: base_current_sysctl_settings

- name: Apply changed Kubernetes sysctl settings for current boot
  ansible.builtin.command:
    cmd: "sysctl -w {{ item.item.key }}={{ item.item.value }}"
  loop: "{{ base_current_sysctl_settings.results }}"
  when: item.stdout != item.item.value
