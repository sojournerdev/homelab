version: "3"

tasks:
  kubeconfig:fetch:
    desc: Fetch the K3s kubeconfig for local kubectl access
    dir: "{{.ANSIBLE_DIR}}"
    cmds:
      - task: tools:kubectl
      - mkdir -p "{{.KUBECONFIG_DIR}}"
      - chmod 700 "{{.KUBECONFIG_DIR}}"
      - >-
        ansible k3s_servers
        -i "{{.INVENTORY}}"
        -b
        -m fetch
        -a "src=/etc/rancher/k3s/k3s.yaml dest={{.KUBECONFIG_LOCAL}} flat=true"
        --ask-become-pass
      - >-
        "{{.TOOLS_BIN}}/kubectl" config set-cluster "{{.KUBECONFIG_CLUSTER}}"
        --server="{{.K3S_SERVER_URL}}"
        --kubeconfig="{{.KUBECONFIG_LOCAL}}"
      - chmod 600 "{{.KUBECONFIG_LOCAL}}"
      - KUBECONFIG="{{.KUBECONFIG_LOCAL}}" "{{.TOOLS_BIN}}/kubectl" config view --minify

  kubeconfig:status:
    desc: Verify local kubectl access using the fetched K3s kubeconfig
    cmds:
      - task: tools:kubectl
      - KUBECONFIG="{{.KUBECONFIG_LOCAL}}" "{{.TOOLS_BIN}}/kubectl" get nodes -o wide
