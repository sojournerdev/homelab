version: "3"

tasks:
  bootstrap:
    desc: Prepare the Ubuntu Server node and install K3s
    dir: "{{.ANSIBLE_DIR}}"
    cmds:
      - task: bootstrap:ping
      - "{{.ANSIBLE_PLAYBOOK}} playbooks/site.yml"

  bootstrap:ping:
    desc: Check Ansible connectivity to the homelab node
    dir: "{{.ANSIBLE_DIR}}"
    cmds:
      - ansible homelab -i "{{.INVENTORY}}" -m ping

  bootstrap:prep:
    desc: Prepare the Ubuntu Server node for K3s
    dir: "{{.ANSIBLE_DIR}}"
    cmds:
      - task: bootstrap:ping
      - "{{.ANSIBLE_PLAYBOOK}} playbooks/prep.yml"

  bootstrap:k3s:
    desc: Install K3s server
    dir: "{{.ANSIBLE_DIR}}"
    cmds:
      - task: bootstrap:ping
      - "{{.ANSIBLE_PLAYBOOK}} playbooks/k3s.yml"

  bootstrap:status:
    desc: Verify K3s node health
    dir: "{{.ANSIBLE_DIR}}"
    cmds:
      - >-
        ansible k3s_servers
        -i "{{.INVENTORY}}"
        -b
        -m command
        -a "/usr/local/bin/k3s kubectl get nodes -o wide"

  bootstrap:check:
    desc: Run Ansible syntax checks
    dir: "{{.ANSIBLE_DIR}}"
    cmds:
      - "{{.ANSIBLE_PLAYBOOK}} playbooks/site.yml --syntax-check"
